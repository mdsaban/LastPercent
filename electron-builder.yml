appId: com.lastpercent.app
productName: LastPercent
directories:
  buildResources: assets
  output: release

mac:
  category: public.app-category.utilities
  icon: assets/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    LSUIElement: true

files:
  - out/**/*
  - assets/**/*

publish:
  provider: github
  owner: mdsaban
  repo: lastpercent
  releaseType: release
